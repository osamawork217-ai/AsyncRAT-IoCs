name: Update MalwareBazaar Hashes

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Verify secret exists
        env:
          MB_API_KEY: ${{ secrets.MB_API_KEY }}
        run: |
          if [ -z "$MB_API_KEY" ]; then
            echo "MB_API_KEY is missing"
            exit 1
          fi
          echo "MB_API_KEY is present"
          echo "MB_API_KEY length: ${#MB_API_KEY}"

      - name: Run hash fetcher
        env:
          MB_API_KEY: ${{ secrets.MB_API_KEY }}
        run: python fetch_hashes.py

      - name: Show output preview
        run: |
          echo "First 10 lines of Malware_Bazaar_Recent.txt:"
          head -n 10 Malware_Bazaar_Recent.txt || true
          echo "Total lines:"
          wc -l Malware_Bazaar_Recent.txt || true

      - name: Commit and push if changed
        run: |
          git config --global user.name "hash-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add Malware_Bazaar_Recent.txt
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto update MalwareBazaar hashes"
          git push
